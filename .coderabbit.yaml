# CodeRabbit configuration for strict, high-quality reviews

reviews:
    profile: strict # strict | chill | balanced
    request_changes_workflow: true
    high_level_summary: true
    high_level_summary_placeholder: false
    auto_review:
        enabled: true
        drafts: false

    review_status: true

    collapse_walkthrough: false

    poem: false

    path_filters:
        - "!node_modules/**"
        - "!dist/**"
        - "!build/**"
        - "!coverage/**"
        - "!*.lock"
        - "!*.log"

    tools:
        eslint:
            enabled: true
        prettier:
            enabled: true
        typescript:
            enabled: true
        dockerfile:
            enabled: true
        github-actions:
            enabled: true

    instructions: |
        Review the code as a senior software engineer.

        Focus on:
        - Security vulnerabilities
        - Performance issues
        - Bad architecture decisions
        - Code smells
        - Over-engineering / under-engineering
        - Missing error handling
        - Edge cases
        - Type safety issues
        - Async / concurrency bugs
        - Memory leaks
        - SQL / injection risks
        - API validation problems

        Be strict.
        Suggest better patterns when possible.
        Prefer clean, maintainable, production-ready code.

        If something is unclear, ask for changes.

        Do not approve weak code.

chat:
    auto_reply: false

knowledge_base:
    enabled: true

early_access: true
